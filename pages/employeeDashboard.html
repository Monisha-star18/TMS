<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelSync — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="../styles/employeeDashboard.css">
</head>
<body>

<div class="offcanvas offcanvas-end" tabindex="-1" id="userOffcanvas" aria-labelledby="userOffcanvasLabel">
  <div class="offcanvas-header border-bottom">
    <h5 class="offcanvas-title" id="userOffcanvasLabel">
      <i class="ti ti-user me-2"></i>User Profile
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body">

    <div class="avatar-row d-flex flex-column">
        <div class="oc-name" id="oc-name">—</div>
        <div class="oc-role" id="oc-dept">—</div>
    </div>

    

    <div class="section-sep">Details</div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" id="oc-email" readonly>
      </div>

      <div class="field-group">
        <label class="field-label">Employee ID</label>
        <input class="field-input" id="oc-empid" readonly>
      </div>
      <div class="field-group">
        <label class="field-label">Designation</label>
        <input class="field-input" id="oc-designation" readonly>
      </div>
      <div class="field-group">
        <label class="field-label">Project ID</label>
        <input class="field-input" id="oc-projectid" readonly>
      </div>
    
    

    <div class="mt-4">
      <button class="btn btn-primary" data-bs-dismiss="offcanvas">
         Close
      </button>
      <button class="btn btn-danger" onclick="handleLogout()">Logout</button>
    </div>

  </div>
</div>


<div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel" >
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="addModalLabel">
          <i class="ti ti-plus me-2"></i>New Travel Request
        </h5>
        <button class="btn btn-secondary" type="button" onclick="clearLoginForm()">Clear</button>
      </div>

      <div class="modal-body">
        <div class="row g-3">

          <div class="col-6">
            <label class="field-label">From city</label>
            <input class="field-input" id="a-from" placeholder="e.g. Chennai">
            <small class="text-danger" id="a-from-desc"></small>
          </div>
          <div class="col-6">
            <label class="field-label">To city</label>
            <input class="field-input" id="a-to" placeholder="e.g. Delhi">
            <small class="text-danger" id="a-to-desc"></small>
          </div>

          <div class="col-6">
            <label class="field-label">Start date</label>
            <input class="field-input" id="a-start" type="date">
            <small class="text-danger" id="a-start-desc"></small>
          </div>
          <div class="col-6">
            <label class="field-label">End date</label>
            <input class="field-input" id="a-end" type="date">
            <small class="text-danger" id="a-end-desc"></small>
          </div>

          <div class="col-12">
            <label class="field-label">Purpose</label>
            <input class="field-input" id="a-purpose" placeholder="Trip purpose">
            <small class="text-danger" id="a-purpose-desc"></small>
          </div>

          <div class="col-6">
            <label class="field-label">Est. cost (₹)</label>
            <input class="field-input" id="a-cost" type="number" min="1" step="1" placeholder="e.g. 20000">
            <small class="text-danger" id="a-cost-desc"></small>
          </div>
          <div class="col-6">
            <label class="field-label">Transport mode</label>
            <select class="field-select" id="a-mode">
              <option value="plane">✈️ Plane</option>
              <option value="car">🚗 Car</option>
              <option value="train">🚆 Train</option>
            </select>
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button class="btn" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveAdd()">
          Save request
        </button>
      </div>

    </div>
  </div>
</div>


<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="editModalLabel">
          <i class="ti ti-pencil me-2"></i>Edit Travel Request
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="e-id">
        <div class="row g-3">

          <div class="col-6">
            <label class="field-label">From city</label>
            <input class="field-input" id="e-from">
            <small class="text-danger" id="e-from-desc"></small>
          </div>
          <div class="col-6">
            <label class="field-label">To city</label>
            <input class="field-input" id="e-to">
            <small class="text-danger" id="e-to-desc"></small>
          </div>

          <div class="col-6">
            <label class="field-label">Start date</label>
            <input class="field-input" id="e-start" type="date">
            <small class="text-danger" id="e-start-desc"></small>
          </div>
          <div class="col-6">
            <label class="field-label">End date</label>
            <input class="field-input" id="e-end" type="date">
            <small class="text-danger" id="e-end-desc"></small>
          </div>

          <div class="col-12">
            <label class="field-label">Purpose</label>
            <input class="field-input" id="e-purpose">
            <small class="text-danger" id="e-purpose-desc"></small>
          </div>

          <div class="col-6">
            <label class="field-label">Est. cost (₹)</label>
            <input class="field-input" id="e-cost" type="number" min="1" step="1">
            <small class="text-danger" id="e-cost-desc"></small>
          </div>
          <div class="col-6">
            <label class="field-label">Transport mode</label>
            <select class="field-select" id="e-mode">
              <option value="plane">✈️ Plane</option>
              <option value="car">🚗 Car</option>
              <option value="train">🚆 Train</option>
            </select>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">
          <i class="ti ti-check me-1"></i> Save changes
        </button>
      </div>

    </div>
  </div>
</div>



  <div class="nav">
    <span class="nav-brand">
      <i class="ti ti-plane" style="font-size:15px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>TravelSync
    </span>
    <div class="nav-actions">
      <button class="btn btn-icon" data-bs-toggle="offcanvas" data-bs-target="#userOffcanvas" title="Profile">
        <i class="ti ti-user" style="font-size:16px" aria-hidden="true"></i>
      </button>
      <span class="nav-username" id="nav-username">—</span>

      
    </div>
  </div>

  <div class="container">
    <div class="top-row container">
      <div>
        <h1 class="title">Request dashboard</h1>
        <p class="sub" id="sub-title">Manage and track your travel requests</p>
      </div>
      <div class="top-actions">
        <button class="restore-btn" onclick="restoreAll()">
          <i class="ti ti-arrow-back-up" style="font-size:14px" aria-hidden="true"></i> Restore
        </button>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
          <i class="ti ti-plus" style="font-size:14px;vertical-align:-2px" aria-hidden="true"></i> Add request
        </button>
      </div>
    </div>

    <div class="metrics" id="metrics"></div>
    <div class="search-bar">
      <i class="ti ti-search search-icon" aria-hidden="true"></i>
      <input type="text" class="search-input" id="searchInput" placeholder="Search by destination or purpose...">
    </div>
    <div class="filter-bar" id="filters"></div>
    <div id="cards-container"></div>

      <div class="modal fade" id="restoreModal">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Deleted Requests</h5>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="restoreContainer"></div>
          </div>
        </div>
      </div>

  </div>



<script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../scripts/employeeDashboard.js"></script>
</body>
</html>
